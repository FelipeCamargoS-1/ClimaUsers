services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weather_users}
      POSTGRES_USER: ${POSTGRES_USER:-weather_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/data:/data:ro
      - ./backend/sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s

  database-init:
    build: { context: ./backend, dockerfile: Dockerfile }
    restart: "no"
    environment: &backend-environment
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-weather_app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-weather_users}?schema=public
      PSQL_DATABASE_URL: postgresql://${POSTGRES_USER:-weather_app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-weather_users}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:${FRONTEND_PORT:-8080}}
      AUTH_PEPPER: ${AUTH_PEPPER:-change-this-auth-pepper}
      CSRF_SECRET: ${CSRF_SECRET:-change-this-csrf-secret}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      IMPORT_MODE: ${IMPORT_MODE:-append}
      IMPORT_LIMIT: ${IMPORT_LIMIT:-0}
      IMPORT_FORCE: ${IMPORT_FORCE:-false}
      IMPORT_CSV_FORMAT: ${IMPORT_CSV_FORMAT:-legacy4}
      ALLOW_PRODUCTION_IMPORT: ${ALLOW_PRODUCTION_IMPORT:-false}
    command:
      - sh
      - -c
      - >-
        npx prisma migrate deploy &&
        if [ -f /data/users.csv.tgz ]; then
          psql "$${PSQL_DATABASE_URL}" -X \
            -v import_mode="$${IMPORT_MODE}" \
            -v import_limit="$${IMPORT_LIMIT}" \
            -v import_force="$${IMPORT_FORCE}" \
            -v import_csv_format="$${IMPORT_CSV_FORMAT}" \
            -v allow_production="$${ALLOW_PRODUCTION_IMPORT}" \
            -f /app/sql/import-users.sql;
        else
          echo "data/users.csv.tgz ausente; importação inicial ignorada.";
        fi
    volumes:
      - ./backend/data:/data:ro
    depends_on:
      postgres: { condition: service_healthy }

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    restart: unless-stopped
    environment: *backend-environment
    ports: ["${BACKEND_PORT:-3000}:3000"]
    command: ["npm", "run", "start"]
    depends_on:
      database-init: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args: { VITE_API_URL: "${VITE_API_URL:-http://localhost:${BACKEND_PORT:-3000}/api}" }
    restart: unless-stopped
    ports: ["${FRONTEND_PORT:-8080}:80"]
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
